name: 'Skill Lint'
description: 'Validate Agent Skills (SKILL.md) for Claude.ai, Claude Code, and other agents'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  path:
    description: 'Directory to scan for skills'
    required: false
    default: '.'
  quiet:
    description: 'Only report errors (suppress warnings)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Run skill-lint
      shell: bash
      run: |
        ARGS="${{ inputs.path }}"
        if [ "${{ inputs.quiet }}" = "true" ]; then
          ARGS="$ARGS --quiet"
        fi
        node ${{ github.action_path }}/dist/bundle.js $ARGS
